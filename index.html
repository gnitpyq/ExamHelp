<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rebrand.ly/examhelp - Vault Closed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-element {
            position: absolute;
            color: rgba(46, 160, 67, 0.1);
            font-family: 'Fira Code', monospace;
            font-size: 2rem;
            animation: float 10s infinite linear;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            z-index: 1;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 0 30px rgba(46, 160, 67, 0.2);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-family: 'Fira Code', monospace;
            font-size: 2.5rem;
            color: #ff7b72;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255, 123, 114, 0.5);
        }

        .status {
            display: inline-block;
            background: #ff7b72;
            color: #0d1117;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 123, 114, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 123, 114, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 123, 114, 0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #21262d;
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid #30363d;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #2ea043;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #58a6ff;
            font-family: 'Fira Code', monospace;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .funny-message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            min-height: 80px; /* Prevents layout shift during typing */
            color: #c9d1d9;
        }

        .reopen-badge {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: #2ea043;
            text-shadow: 0 0 10px rgba(46, 160, 67, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.1rem;
            background-color: #58a6ff;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div id="bg-container"></div>

    <div class="container">
        <div class="status">System Offline</div>
        <h1>rebrand.ly/examhelp</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" data-target="100">0</div>
                <div class="stat-label">Clicks of Desperation</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-target="10">0</div>
                <div class="stat-label">Students Saved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-target="2">0</div>
                <div class="stat-label">Labs Conquered</div>
            </div>
        </div>

        <div class="funny-message">
            <span id="typing-text"></span><span class="cursor"></span>
        </div>

        <div class="reopen-badge">
            > Initiating sleep mode. Vault reopens next semester...
        </div>
    </div>

    <script>
        // 1. Create floating background symbols
        const bgContainer = document.getElementById('bg-container');
        const symbols = ['{ }', '</>', '();', '[]', '||', '&&', '404'];
        
        for (let i = 0; i < 20; i++) {
            let el = document.createElement('div');
            el.className = 'bg-element';
            el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            el.style.left = `${Math.random() * 100}vw`;
            el.style.animationDuration = `${Math.random() * 5 + 5}s`;
            el.style.animationDelay = `${Math.random() * 5}s`;
            bgContainer.appendChild(el);
        }

        // 2. Count-up animation for stats
        const statNumbers = document.querySelectorAll('.stat-number');
        
        statNumbers.forEach(stat => {
            const target = +stat.getAttribute('data-target');
            const duration = 2000; // 2 seconds
            const increment = target / (duration / 16); // 60fps
            
            let current = 0;
            const updateCounter = () => {
                current += increment;
                if (current < target) {
                    stat.innerText = Math.ceil(current) + (target === 100 || target === 10 ? '+' : '');
                    requestAnimationFrame(updateCounter);
                } else {
                    stat.innerText = target + (target === 100 || target === 10 ? '+' : '');
                }
            };
            setTimeout(updateCounter, 500); // slight delay before counting starts
        });

        // 3. Typing animation for the funny message
        const messageText = "Mission 'Pass The Lab' is officially over. The servers are tired, the code is resting, and frankly, you all need to go touch some grass. The cheat code vault is now locked. May your bugs be few and your summer break be error-free!";
        const typingElement = document.getElementById('typing-text');
        let charIndex = 0;

        function typeMessage() {
            if (charIndex < messageText.length) {
                typingElement.innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeMessage, 40); // typing speed
            }
        }

        // Start typing after a short delay
        setTimeout(typeMessage, 1000);
    </script>
</body>
</html>
