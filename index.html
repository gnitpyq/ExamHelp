<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This is the magic line that forces the phone to act like a 1024px wide desktop monitor -->
    <meta name="viewport" content="width=1024">
    <title>rebrand.ly/examhelp - Vault Closed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: relative;
        }

        /* Animated Funny Background Text */
        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-phrase {
            position: absolute;
            color: rgba(46, 160, 67, 0.6); 
            text-shadow: 0 0 8px rgba(46, 160, 67, 0.5); 
            font-family: 'Fira Code', monospace;
            white-space: nowrap;
            user-select: none;
            animation: driftUp linear forwards;
        }

        @keyframes driftUp {
            0% { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Main Container - FORCED DESKTOP WIDTH */
        .container {
            z-index: 1;
            text-align: center;
            width: 800px; /* Locked to 800px wide */
            padding: 2.5rem;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 0 40px rgba(46, 160, 67, 0.15);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-family: 'Fira Code', monospace;
            font-size: 2.8rem; /* Locked desktop size */
            color: #ff7b72;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px rgba(255, 123, 114, 0.4);
        }

        .status {
            display: inline-block;
            background: #ff7b72;
            color: #0d1117;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 123, 114, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 123, 114, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 123, 114, 0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Locked to 3 columns */
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: #21262d;
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid #30363d;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #2ea043;
            box-shadow: 0 10px 20px rgba(46, 160, 67, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #58a6ff;
            font-family: 'Fira Code', monospace;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .funny-message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            min-height: 100px;
            color: #c9d1d9;
            text-align: center;
        }

        .reopen-badge {
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            color: #2ea043;
            background: rgba(46, 160, 67, 0.1);
            padding: 1rem;
            border-radius: 10px;
            border: 1px dashed #2ea043;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.1rem;
            background-color: #58a6ff;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="container">
        <div class="status">Vault Offline</div>
        <h1>rebrand.ly/examhelp</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" data-target="100">0</div>
                <div class="stat-label">Clicks of Desperation</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-target="10">0</div>
                <div class="stat-label">Grades Saved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" data-target="2">0</div>
                <div class="stat-label">Labs Conquered</div>
            </div>
        </div>

        <div class="funny-message">
            <span id="typing-text"></span><span class="cursor"></span>
        </div>

        <div class="reopen-badge">
            > sudo sleep "until_next_sem"<br>
            > Access Denied. Go enjoy your holidays!
        </div>
    </div>

    <script>
        // 1. GNIT Background Chaos
        const bgContainer = document.getElementById('bg-container');
        const funnyPhrases = [
            "Ctrl+C -> Ctrl+V -> Pray",
            "import java.util.Miracles;",
            "GNIT Lab Server: Overloaded",
            "// TODO: Learn this before finals",
            "Exception: java.lang.NoIdeaWhatImDoing",
            "while(true) { stress(); }",
            "if (exam == tomorrow) { cry(); }",
            "git commit -m 'pls work bro'",
            "Sneaking code like 007",
            "System.out.println('Plz pass me');",
            "Copying from the smart kid...",
            "Error 404: Sleep not found",
            "GNIT Wi-Fi: Disconnected",
            "chmod 777 exam_answers.txt",
            "sudo pass_exam --force",
            "Alt+Tab speed: 1000 WPM"
        ];
        
        function createPhrase() {
            let el = document.createElement('div');
            el.className = 'bg-phrase';
            el.innerText = funnyPhrases[Math.floor(Math.random() * funnyPhrases.length)];
            
            el.style.left = `${Math.random() * 90}vw`; 
            el.style.fontSize = `${Math.random() * 0.6 + 0.8}rem`; 
            el.style.opacity = Math.random() * 0.5 + 0.3; 
            
            const duration = Math.random() * 15 + 10; 
            el.style.animationDuration = `${duration}s`;
            
            bgContainer.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }

        for (let i = 0; i < 15; i++) {
            setTimeout(createPhrase, Math.random() * 5000);
        }
        setInterval(createPhrase, 2000);

        // 2. Count-up animation for stats
        const statNumbers = document.querySelectorAll('.stat-number');
        statNumbers.forEach(stat => {
            const target = +stat.getAttribute('data-target');
            const duration = 2500; 
            const increment = target / (duration / 16); 
            
            let current = 0;
            const updateCounter = () => {
                current += increment;
                if (current < target) {
                    stat.innerText = Math.ceil(current) + (target >= 10 ? '+' : '');
                    requestAnimationFrame(updateCounter);
                } else {
                    stat.innerText = target + (target >= 10 ? '+' : '');
                }
            };
            setTimeout(updateCounter, 600); 
        });

        // 3. Typing animation
        const messageText = "Operation 'Pass The Lab' was a massive success. The GNIT servers are tired, your Alt+Tab fingers need rest, and honestly, you all need to go touch some grass. The underground cheat code vault is officially locked. May your compiler errors be zero and your summer break be epic!";
        const typingElement = document.getElementById('typing-text');
        let charIndex = 0;

        function typeMessage() {
            if (charIndex < messageText.length) {
                typingElement.innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeMessage, 35); 
            }
        }

        setTimeout(typeMessage, 1200);
    </script>
</body>
</html>
